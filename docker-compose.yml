services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: floor_visualizer_api
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: floor_visualizer_web
    depends_on:
      - api
    volumes:
      - ./data/textures:/usr/share/nginx/html/static/textures:ro
    ports:
      - "8080:80"

