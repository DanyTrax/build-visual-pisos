# Stack para Dockge / Docker Compose en produccion
# Carpeta del stack: clona el repo aqui y crea .env junto a este archivo

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      AUTO_GENERATE_SECRETS: "true"
    volumes:
      - ./data:/app/data
    ports:
      - "${API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - floor_net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data/textures:/usr/share/nginx/html/static/textures:ro
    ports:
      - "${WEB_PORT:-8090}:80"
    networks:
      - floor_net

networks:
  floor_net:
    driver: bridge
