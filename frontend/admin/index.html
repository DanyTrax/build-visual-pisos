<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-7xl p-4 md:p-8">
      <section id="loginBox" class="mx-auto max-w-md rounded-2xl bg-white p-6 shadow">
        <h1 class="mb-4 text-xl font-bold">Login admin</h1>
        <form id="loginForm" class="space-y-3">
          <input id="loginEmail" type="email" required placeholder="email" class="w-full rounded border p-2" />
          <input id="loginPassword" type="password" required placeholder="password" class="w-full rounded border p-2" />
          <button class="min-h-11 w-full rounded bg-sky-600 px-3 py-2 font-semibold text-white">Ingresar</button>
        </form>
        <p id="loginStatus" class="mt-3 text-sm text-rose-600"></p>
      </section>

      <section id="dashboard" class="hidden space-y-4">
        <header class="rounded-2xl bg-white p-4 shadow">
          <h1 class="text-xl font-bold">Dashboard</h1>
          <p id="meText" class="text-sm text-slate-600"></p>
          <p id="globalStatus" class="mt-2 text-sm text-sky-700"></p>
        </header>

        <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
          <article class="rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-3 text-lg font-semibold">Losetas</h2>
            <form id="textureForm" class="space-y-2">
              <input name="name" required placeholder="Nombre" class="w-full rounded border p-2" />
              <input name="category" placeholder="Categoria" class="w-full rounded border p-2" />
              <input name="sort_order" type="number" value="10" class="w-full rounded border p-2" />
              <label class="text-sm">
                Imagen:
                <input name="image" type="file" accept="image/*" required class="mt-1 block w-full" />
              </label>
              <button class="min-h-11 w-full rounded bg-emerald-600 px-3 py-2 font-semibold text-white">Subir</button>
            </form>
            <ul id="texturesList" class="mt-4 space-y-2 text-sm"></ul>
          </article>

          <article class="rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-3 text-lg font-semibold">Configuracion IA (admin)</h2>
            <form id="aiForm" class="space-y-2 text-sm">
              <input id="ai_replicate_model" class="w-full rounded border p-2" placeholder="replicate_model" />
              <label class="block">
                Prompt piso
                <textarea id="ai_floor_text_prompt" rows="2" class="mt-1 w-full rounded border p-2" placeholder="patio . stone floor . tile floor"></textarea>
              </label>
              <label class="block">
                Prompt negativo (modelo)
                <textarea id="ai_negative_mask_prompt" rows="2" class="mt-1 w-full rounded border p-2" placeholder="sofa . couch . chair"></textarea>
              </label>
              <label class="block">
                Prompt entorno (cielo, césped, lago…)
                <textarea id="ai_environment_prompt" rows="2" class="mt-1 w-full rounded border p-2" placeholder="grass . sky . lake"></textarea>
              </label>
              <label class="block">
                Prompt muebles (sofa, sillas, mesa — pasada dedicada)
                <textarea id="ai_furniture_subtraction_prompt" rows="2" class="mt-1 w-full rounded border p-2" placeholder="sofa . armchair . cushion . coffee table"></textarea>
              </label>
              <input id="ai_mask_adjustment_factor" type="number" min="0" max="50" class="w-full rounded border p-2" placeholder="mask_adjustment_factor (6 recomendado)" />
              <input id="ai_detection_threshold" type="number" step="0.01" class="w-full rounded border p-2" placeholder="detection_threshold" />
              <input id="ai_box_threshold" type="number" step="0.01" class="w-full rounded border p-2" placeholder="box_threshold" />
              <input id="ai_max_image_width" type="number" class="w-full rounded border p-2" placeholder="max_image_width" />
              <input id="ai_mask_feather_px" type="number" class="w-full rounded border p-2" placeholder="mask_feather_px" />
              <input id="ai_blend_strength" type="number" step="0.01" class="w-full rounded border p-2" placeholder="blend_strength" />
              <label class="flex items-center gap-2">
                <input id="ai_enable_environment_layer" type="checkbox" checked />
                Capa entorno (cielo, césped…)
              </label>
              <label class="flex items-center gap-2">
                <input id="ai_enable_furniture_subtraction" type="checkbox" checked />
                Capa muebles (sofa, sillas, mesa) + filtro color
              </label>
              <label class="flex items-center gap-2">
                <input id="ai_enable_fallback_heuristic" type="checkbox" />
                Activar fallback heuristico
              </label>
              <button class="min-h-11 w-full rounded bg-indigo-600 px-3 py-2 font-semibold text-white">Guardar IA</button>
            </form>
            <form id="aiTestForm" class="mt-3 space-y-2">
              <input name="image" type="file" accept="image/*" required class="block w-full text-sm" />
              <button class="min-h-11 w-full rounded bg-slate-700 px-3 py-2 font-semibold text-white">Probar deteccion</button>
            </form>
            <div id="aiPreviewTabs" class="mt-3 hidden flex flex-wrap gap-2 text-xs">
              <button type="button" data-ai-tab="env" class="rounded border px-2 py-1">Entorno</button>
              <button type="button" data-ai-tab="raw" class="rounded border px-2 py-1">Antes</button>
              <button type="button" data-ai-tab="floor" class="rounded border border-sky-600 px-2 py-1">Solo piso</button>
            </div>
            <img id="aiPreview" class="mt-2 w-full rounded border object-contain" alt="preview ia" />
          </article>

          <article class="rounded-2xl bg-white p-4 shadow">
            <h2 class="mb-3 text-lg font-semibold">Usuarios (admin)</h2>
            <form id="userForm" class="space-y-2">
              <input id="user_email" type="email" required placeholder="Email usuario" class="w-full rounded border p-2" />
              <input id="user_password" type="password" required placeholder="Password temporal" class="w-full rounded border p-2" />
              <select id="user_role" class="w-full rounded border p-2">
                <option value="viewer">viewer</option>
                <option value="editor">editor</option>
                <option value="admin">admin</option>
              </select>
              <button class="min-h-11 w-full rounded bg-violet-600 px-3 py-2 font-semibold text-white">Crear usuario</button>
            </form>
            <ul id="usersList" class="mt-4 space-y-2 text-sm"></ul>
          </article>
        </div>
      </section>
    </main>
    <script src="/admin/js/admin.js"></script>
  </body>
</html>
