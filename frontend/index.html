<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floor Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-6xl p-4 md:p-8">
      <header class="mb-4 rounded-2xl bg-white p-4 shadow">
        <h1 class="text-xl font-bold md:text-2xl">Visualizer de Pisos</h1>
        <p class="text-sm text-slate-600">Sube o toma una foto, detecta piso con IA y aplica materiales.</p>
        <a class="mt-2 inline-block text-sm text-sky-700 underline" href="/landing.html">Ver instructivo de integracion IA</a>
      </header>

      <section class="grid grid-cols-1 gap-4 lg:grid-cols-2">
        <article class="rounded-2xl bg-white p-4 shadow">
          <h2 class="mb-2 text-lg font-semibold">1) Subir foto de habitacion</h2>
          <input id="imageInput" type="file" accept="image/*" capture="environment" class="mb-3 block w-full rounded border p-2" />
          <button id="analyzeBtn" class="min-h-11 w-full rounded-xl bg-sky-600 px-4 py-2 font-semibold text-white hover:bg-sky-700">
            Analizar piso
          </button>
          <p id="statusText" class="mt-3 text-sm text-slate-600">Esperando imagen...</p>
          <img id="previewImg" alt="Preview mascara" class="mt-4 w-full rounded-xl border object-contain" />
        </article>

        <article class="rounded-2xl bg-white p-4 shadow">
          <h2 class="mb-2 text-lg font-semibold">2) Elegir material y ver resultado</h2>
          <div id="texturesGrid" class="grid grid-cols-2 gap-3 md:grid-cols-3"></div>
          <img id="resultImg" alt="Resultado final" class="mt-4 w-full rounded-xl border object-contain" />
        </article>
      </section>
    </main>
    <script src="/js/main.js"></script>
  </body>
</html>
